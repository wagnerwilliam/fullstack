<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        
    <script>

        function prueba() {
            return new Promise(callback => {
                // una vez esta funcion termine su trabajo
                
                setTimeout(() => {
                    callback("valor de la promesa")
                }, 2000)
            })
        }

        prueba().then(value => {
            console.log(value);
            
        })
        

    </script>

</body>
</html>
